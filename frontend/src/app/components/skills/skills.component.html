<section id="skills" class="section skills">
  <div class="container">
    <p class="section-label">Skills</p>
    <h2 class="section-title">Tools of the trade</h2>

    <div class="skills__grid">
      @for (group of skillGroups; track group.category; let i = $index) {
        <div class="skills__group reveal" #reveal [style.transition-delay]="(i * 80) + 'ms'">
          <h3 class="skills__category">{{ group.category }}</h3>
          <ul class="skills__list">
            @for (skill of group.skills; track skill) {
              <li class="skills__item">{{ skill }}</li>
            }
          </ul>
        </div>
      }
    </div>
  </div>
</section>
