<header class="navbar" [class.scrolled]="scrolled()">
  <div class="navbar__inner container">
    <a class="navbar__logo" href="#hero">IL</a>

    <nav class="navbar__links" [class.open]="menuOpen()">
      @for (link of links; track link.label) {
        <a [href]="link.href" class="navbar__link" (click)="closeMenu()">
          {{ link.label }}
        </a>
      }
    </nav>

    <button class="navbar__burger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()" aria-label="Toggle menu">
      <span></span>
      <span></span>
    </button>
  </div>
</header>
