<section id="projects" class="section projects">
  <div class="container">
    <p class="section-label">Projects</p>
    <h2 class="section-title">Things I've built</h2>

    <div class="projects__grid">
      @for (project of projects; track project.title; let i = $index) {
        <article class="projects__card reveal" #reveal [style.transition-delay]="(i * 100) + 'ms'">
          <div class="projects__card-top">
            <span class="projects__index">{{ (i + 1).toString().padStart(2, '0') }}</span>
            <div class="projects__links">
              @if (project.github) {
                <a [href]="project.github" target="_blank" rel="noopener" class="projects__link" aria-label="GitHub">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                  </svg>
                </a>
              }
              @if (project.link) {
                <a [href]="project.link" target="_blank" rel="noopener" class="projects__link" aria-label="Live site">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                    <polyline points="15 3 21 3 21 9"/>
                    <line x1="10" y1="14" x2="21" y2="3"/>
                  </svg>
                </a>
              }
            </div>
          </div>

          <h3 class="projects__title">{{ project.title }}</h3>
          <p class="projects__desc">{{ project.description }}</p>

          <div class="projects__tags">
            @for (tag of project.tags; track tag) {
              <span class="tag">{{ tag }}</span>
            }
          </div>
        </article>
      }
    </div>
  </div>
</section>
