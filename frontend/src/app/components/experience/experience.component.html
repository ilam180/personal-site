<section id="experience" class="section experience">
  <div class="container">
    <p class="section-label">Experience</p>
    <h2 class="section-title">Where I've worked</h2>

    <div class="experience__list">
      @for (exp of experiences; track exp.company; let i = $index) {
        <article class="experience__item reveal" #reveal [style.transition-delay]="(i * 80) + 'ms'">
          <div class="experience__header">
            <div class="experience__left">
              <h3 class="experience__role">{{ exp.role }}</h3>
              <p class="experience__company">{{ exp.company }}</p>
            </div>
            <div class="experience__right">
              <span class="experience__period">{{ exp.period }}</span>
              <span class="experience__location">{{ exp.location }}</span>
            </div>
          </div>

          <ul class="experience__bullets">
            @for (bullet of exp.bullets; track bullet) {
              <li class="experience__bullet">{{ bullet }}</li>
            }
          </ul>

          <div class="experience__tags">
            @for (tag of exp.tags; track tag) {
              <span class="tag">{{ tag }}</span>
            }
          </div>
        </article>
      }
    </div>
  </div>
</section>
